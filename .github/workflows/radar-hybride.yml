name: 🕵️ OUTFITY - Radar Hybride Automatique

on:
  schedule:
    # Tous les mardis à 12:00 UTC (13h ou 14h en France selon l'heure d'été/hiver)
    - cron: '0 12 * * 2'
  workflow_dispatch: # Permet de lancer le scrape manuellement depuis l'interface GitHub

jobs:
  scrape-trends:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🟢 Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installation des dépendances (via cache)
        run: npm ci

      - name: 🌐 Installation de Puppeteer & Chrome
        run: npx puppeteer browsers install chrome

      - name: 🧪 Génération Prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      - name: 🚀 Lancement du Scrape Radar Hybride
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ADMIN_NOTIFY_WEBHOOK_URL: ${{ secrets.ADMIN_NOTIFY_WEBHOOK_URL }}
        run: npx tsx --tsconfig tsconfig.scripts.json scripts/radar-hybride.ts
