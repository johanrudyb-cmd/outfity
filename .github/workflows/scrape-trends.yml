name: OUTFITY - Radar Viral 24/7

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *' # Tous les jours à 7h00 (Heure FR)
  workflow_dispatch:

jobs:
  scrape-trends:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: 🛰️ Récupération du code
        uses: actions/checkout@v4

      - name: 🟢 Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🌐 Installation de Chrome (pour Puppeteer)
        run: npx puppeteer browsers install chrome

      - name: 🧪 Génération Prisma
        run: npx prisma generate

      - name: 🚀 Lancement du Radar Viral
        run: node_modules/.bin/tsx scripts/radar-hybride.ts
