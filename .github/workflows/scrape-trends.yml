name: OUTFITY - Radar Viral 24/7

on:
  schedule:
    - cron: '0 6 * * *' # Tous les jours à 7h00 (Heure FR)
  workflow_dispatch: # Permet de le lancer à la main pour tester

jobs:
  scrape-trends:
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: 🛰️ Récupération du code
        uses: actions/checkout@v4

      - name: 🟢 Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: npm install

      - name: 🌐 Installation du Navigateur (pour TikTok/Pinterest)
        run: npx puppeteer install

      - name: 🧪 Génération Prisma
        run: npx prisma generate

      - name: 🚀 Lancement du Radar Viral (0€)
        run: npx ts-node scripts/radar-hybride.ts

